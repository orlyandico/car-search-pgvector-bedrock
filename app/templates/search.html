<!DOCTYPE html>
<html>
<head>
    <title>Car Search - Find Your Perfect Car</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Car Search</h1>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
        
        <div class="search-section">
            <form id="searchForm">
                <div class="filters">
                    <div class="filter-group">
                        <label>Make</label>
                        <select id="manufacturer" multiple>
                            <option value="toyota">Toyota</option>
                            <option value="ford">Ford</option>
                            <option value="chevrolet">Chevrolet</option>
                            <option value="honda">Honda</option>
                            <option value="nissan">Nissan</option>
                            <option value="jeep">Jeep</option>
                            <option value="ram">RAM</option>
                            <option value="gmc">GMC</option>
                            <option value="bmw">BMW</option>
                            <option value="mercedes-benz">Mercedes-Benz</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Body Type</label>
                        <select id="type" multiple>
                            <option value="sedan">Sedan</option>
                            <option value="suv">SUV</option>
                            <option value="truck">Truck</option>
                            <option value="coupe">Coupe</option>
                            <option value="hatchback">Hatchback</option>
                            <option value="wagon">Wagon</option>
                            <option value="van">Van</option>
                            <option value="convertible">Convertible</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Year: <span id="yearRange">1990 - 2030</span></label>
                        <div class="range-container">
                            <input type="range" id="minYear" min="1990" max="2030" value="1990">
                            <input type="range" id="maxYear" min="1990" max="2030" value="2030">
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Price: <span id="priceRange">$0 - $250,000</span></label>
                        <div class="range-container">
                            <input type="range" id="minPrice" min="0" max="250000" step="1000" value="0">
                            <input type="range" id="maxPrice" min="0" max="250000" step="1000" value="250000">
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Mileage: <span id="mileageRange">0 - 300,000</span></label>
                        <div class="range-container">
                            <input type="range" id="minOdometer" min="0" max="300000" step="5000" value="0">
                            <input type="range" id="maxOdometer" min="0" max="300000" step="5000" value="300000">
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Fuel Type</label>
                        <select id="fuel">
                            <option value="">Any</option>
                            <option value="gas">Gas</option>
                            <option value="diesel">Diesel</option>
                            <option value="electric">Electric</option>
                            <option value="hybrid">Hybrid</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Transmission</label>
                        <select id="transmission">
                            <option value="">Any</option>
                            <option value="automatic">Automatic</option>
                            <option value="manual">Manual</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Condition</label>
                        <select id="condition">
                            <option value="">Any</option>
                            <option value="excellent">Excellent</option>
                            <option value="like new">Like New</option>
                            <option value="good">Good</option>
                            <option value="fair">Fair</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Colour</label>
                        <select id="color">
                            <option value="">Any</option>
                            <option value="black">Black</option>
                            <option value="white">White</option>
                            <option value="silver">Silver</option>
                            <option value="grey">Grey</option>
                            <option value="blue">Blue</option>
                            <option value="red">Red</option>
                            <option value="green">Green</option>
                            <option value="brown">Brown</option>
                            <option value="orange">Orange</option>
                            <option value="yellow">Yellow</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Keywords</label>
                        <input type="text" id="keywords" placeholder="Search description">
                    </div>
                    
                    <div class="filter-group">
                        <label>Sort By</label>
                        <select id="sortBy">
                            <option value="price">Price (Low to High)</option>
                            <option value="year">Year (Newest First)</option>
                            <option value="odometer">Mileage (Lowest First)</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="button">Search Cars</button>
            </form>
        </div>
        
        <div class="results-header" id="resultsHeader" style="display:none;">
            <span id="resultsCount">0 cars found</span>
        </div>
        
        <div id="results"></div>
    </div>
    
    <script src="/static/js/search.js"></script>
</body>
</html>
